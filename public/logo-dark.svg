<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 210 60" width="210" height="60" fill="none">

  <!-- ── Dark background ── -->
  <rect width="210" height="60" rx="14" fill="#061a0a"/>

  <defs>
    <linearGradient id="d-top" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#14A800"/>
      <stop offset="100%" stop-color="#00d4aa"/>
    </linearGradient>
    <linearGradient id="d-right" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0d8c00"/>
      <stop offset="100%" stop-color="#00b892"/>
    </linearGradient>
    <linearGradient id="d-left" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#1bcb06"/>
      <stop offset="100%" stop-color="#00d4aa"/>
    </linearGradient>
    <filter id="d-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="d-nglow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="1.8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <style>
    @keyframes d-node { 0%,100%{opacity:.88} 50%{opacity:1} }
    @keyframes d-line { 0%,100%{opacity:.55} 50%{opacity:.90} }
    @keyframes d-ring { 0%{r:5;opacity:.65} 100%{r:13;opacity:0} }
    .d-node { animation: d-node 2.5s ease-in-out infinite }
    .d-line { animation: d-line 2.4s ease-in-out infinite }
    .d-ring { animation: d-ring 2s  ease-out  infinite }
  </style>

  <!-- ── Icon mark ── -->
  <svg x="4" y="4" width="52" height="52" viewBox="0 0 100 100" overflow="visible">
    <path d="M50 12 L88 32 L50 52 L12 32 Z" fill="url(#d-top)"   opacity=".95"/>
    <path d="M88 32 L88 62 L50 82 L50 52 Z" fill="url(#d-right)" opacity=".85"/>
    <path d="M12 32 L12 62 L50 82 L50 52 Z" fill="url(#d-left)"  opacity=".75"/>
    <path d="M50 12 L88 32 L50 52 L12 32 Z" stroke="rgba(255,255,255,.26)" stroke-width=".7" fill="none"/>
    <path d="M88 32 L88 62 L50 82 L50 52 Z" stroke="rgba(255,255,255,.16)" stroke-width=".7" fill="none"/>
    <path d="M12 32 L12 62 L50 82 L50 52 Z" stroke="rgba(255,255,255,.16)" stroke-width=".7" fill="none"/>
    <g stroke="rgba(255,255,255,.72)" stroke-width=".9" filter="url(#d-glow)" class="d-line">
      <line x1="50" y1="32" x2="34" y2="24"/>
      <line x1="50" y1="32" x2="66" y2="24"/>
      <line x1="50" y1="32" x2="74" y2="36"/>
      <line x1="50" y1="32" x2="66" y2="44"/>
      <line x1="50" y1="32" x2="34" y2="44"/>
      <line x1="50" y1="32" x2="26" y2="36"/>
      <line x1="34" y1="24" x2="66" y2="24"/>
      <line x1="66" y1="24" x2="74" y2="36"/>
      <line x1="74" y1="36" x2="66" y2="44"/>
      <line x1="34" y1="44" x2="26" y2="36"/>
    </g>
    <circle cx="34" cy="24" r="3.5" fill="white" opacity=".92" filter="url(#d-nglow)" class="d-node" style="animation-delay:0s"/>
    <circle cx="66" cy="24" r="3.5" fill="white" opacity=".92" filter="url(#d-nglow)" class="d-node" style="animation-delay:.4s"/>
    <circle cx="74" cy="36" r="3.5" fill="white" opacity=".92" filter="url(#d-nglow)" class="d-node" style="animation-delay:.8s"/>
    <circle cx="66" cy="44" r="3.5" fill="white" opacity=".92" filter="url(#d-nglow)" class="d-node" style="animation-delay:1.2s"/>
    <circle cx="34" cy="44" r="3.5" fill="white" opacity=".92" filter="url(#d-nglow)" class="d-node" style="animation-delay:1.6s"/>
    <circle cx="26" cy="36" r="3.5" fill="white" opacity=".92" filter="url(#d-nglow)" class="d-node" style="animation-delay:2s"/>
    <circle cx="50" cy="32" r="8" fill="none" stroke="rgba(255,255,255,.38)" stroke-width="1" class="d-ring"/>
    <circle cx="50" cy="32" r="5.5" fill="rgba(255,255,255,.22)" stroke="rgba(255,255,255,.82)" stroke-width="1"/>
    <circle cx="50" cy="32" r="3" fill="white" filter="url(#d-nglow)" class="d-node"/>
  </svg>

  <!-- ── Wordmark — white base, "chi" in green ── -->
  <text
    x="62" y="35"
    font-family="Inter, system-ui, -apple-system, Helvetica Neue, sans-serif"
    font-size="24" font-weight="800" letter-spacing="-0.6"
    fill="white"
  >Task<tspan fill="#14A800">chi</tspan></text>

  <!-- Subtitle — muted white -->
  <text
    x="63" y="49"
    font-family="Inter, system-ui, -apple-system, Helvetica Neue, sans-serif"
    font-size="7.5" font-weight="600" letter-spacing="1.8"
    fill="rgba(255,255,255,.55)"
  >МАРКЕТПЛЕЙС УСЛУГ</text>

</svg>
