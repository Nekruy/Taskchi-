<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" fill="none">
  <defs>
    <linearGradient id="i-top" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#14A800"/>
      <stop offset="100%" stop-color="#00d4aa"/>
    </linearGradient>
    <linearGradient id="i-right" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0d8c00"/>
      <stop offset="100%" stop-color="#00b892"/>
    </linearGradient>
    <linearGradient id="i-left" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#1bcb06"/>
      <stop offset="100%" stop-color="#00d4aa"/>
    </linearGradient>
    <filter id="i-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="i-nglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <style>
    @keyframes i-node { 0%,100%{opacity:.85} 50%{opacity:1} }
    @keyframes i-line { 0%,100%{opacity:.55} 50%{opacity:.95} }
    @keyframes i-ring { 0%{r:6;opacity:.7} 100%{r:16;opacity:0} }
    .i-node { animation: i-node 2.5s ease-in-out infinite }
    .i-line { animation: i-line 2.4s ease-in-out infinite }
    .i-ring { animation: i-ring 2s  ease-out  infinite }
  </style>

  <!-- ── Platform ── -->
  <path d="M50 12 L88 32 L50 52 L12 32 Z" fill="url(#i-top)"   opacity=".95"/>
  <path d="M88 32 L88 62 L50 82 L50 52 Z" fill="url(#i-right)" opacity=".85"/>
  <path d="M12 32 L12 62 L50 82 L50 52 Z" fill="url(#i-left)"  opacity=".75"/>

  <!-- Edge definition lines -->
  <path d="M50 12 L88 32 L50 52 L12 32 Z" stroke="rgba(255,255,255,.28)" stroke-width=".6" fill="none"/>
  <path d="M88 32 L88 62 L50 82 L50 52 Z" stroke="rgba(255,255,255,.18)" stroke-width=".6" fill="none"/>
  <path d="M12 32 L12 62 L50 82 L50 52 Z" stroke="rgba(255,255,255,.18)" stroke-width=".6" fill="none"/>

  <!-- Connection lines -->
  <g stroke="rgba(255,255,255,.72)" stroke-width=".9" filter="url(#i-glow)" class="i-line">
    <line x1="50" y1="32" x2="34" y2="24"/>
    <line x1="50" y1="32" x2="66" y2="24"/>
    <line x1="50" y1="32" x2="74" y2="36"/>
    <line x1="50" y1="32" x2="66" y2="44"/>
    <line x1="50" y1="32" x2="34" y2="44"/>
    <line x1="50" y1="32" x2="26" y2="36"/>
    <line x1="34" y1="24" x2="66" y2="24"/>
    <line x1="66" y1="24" x2="74" y2="36"/>
    <line x1="74" y1="36" x2="66" y2="44"/>
    <line x1="34" y1="44" x2="26" y2="36"/>
  </g>

  <!-- Outer nodes (6) -->
  <circle cx="34" cy="24" r="4" fill="white" opacity=".92" filter="url(#i-nglow)" class="i-node" style="animation-delay:0s"/>
  <circle cx="66" cy="24" r="4" fill="white" opacity=".92" filter="url(#i-nglow)" class="i-node" style="animation-delay:.4s"/>
  <circle cx="74" cy="36" r="4" fill="white" opacity=".92" filter="url(#i-nglow)" class="i-node" style="animation-delay:.8s"/>
  <circle cx="66" cy="44" r="4" fill="white" opacity=".92" filter="url(#i-nglow)" class="i-node" style="animation-delay:1.2s"/>
  <circle cx="34" cy="44" r="4" fill="white" opacity=".92" filter="url(#i-nglow)" class="i-node" style="animation-delay:1.6s"/>
  <circle cx="26" cy="36" r="4" fill="white" opacity=".92" filter="url(#i-nglow)" class="i-node" style="animation-delay:2s"/>

  <!-- Centre node + pulse ring -->
  <circle cx="50" cy="32" r="9" fill="none" stroke="rgba(255,255,255,.38)" stroke-width="1" class="i-ring"/>
  <circle cx="50" cy="32" r="6" fill="rgba(255,255,255,.22)" stroke="rgba(255,255,255,.82)" stroke-width="1.2"/>
  <circle cx="50" cy="32" r="3.5" fill="white" filter="url(#i-nglow)" class="i-node"/>
</svg>
